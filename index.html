<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Weekly Budget" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <title>Weekly Budget</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <style>
    :root{--bg:#000;--fg:#fff;--muted:#aaa;--line:#333;--input:#000;--button:#fff;--button-text:#000}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;padding:0;background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}body{min-height:100vh;padding:env(safe-area-inset-top) 16px calc(24px + env(safe-area-inset-bottom))}.app{max-width:520px;margin:0 auto}header{padding:24px 0 16px;border-bottom:1px solid var(--line)}h1{margin:0;font-size:28px;letter-spacing:-.04em;line-height:1}.sub{margin-top:8px;color:var(--muted);font-size:14px}.summary{padding:22px 0;border-bottom:1px solid var(--line)}.label{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.12em}.spent{margin-top:8px;font-size:48px;font-weight:800;letter-spacing:-.06em;line-height:1}.left{margin-top:10px;color:var(--muted);font-size:16px}.bar{margin-top:18px;height:12px;border:1px solid var(--fg);background:var(--bg)}.bar>div{height:100%;background:var(--fg);width:0%;transition:width .2s ease}.over{color:var(--fg);font-weight:700}section{padding:18px 0;border-bottom:1px solid var(--line)}.row{display:flex;gap:10px;align-items:center}.row>*{flex:1}input,button{width:100%;border-radius:0;border:1px solid var(--fg);background:var(--input);color:var(--fg);padding:14px 12px;font:inherit;outline:none}input::placeholder{color:#777}button{background:var(--button);color:var(--button-text);font-weight:800;cursor:pointer}button.secondary,button.danger{background:var(--bg);color:var(--fg)}button:active{transform:translateY(1px)}.quick{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}.quick button{padding:12px 6px;background:var(--bg);color:var(--fg)}.settings-grid{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center}.small{font-size:13px;color:var(--muted);margin-top:8px;line-height:1.4}ul{list-style:none;padding:0;margin:12px 0 0}li{display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:center;padding:12px 0;border-top:1px solid var(--line)}.item-title{font-weight:700}.item-meta{color:var(--muted);font-size:12px;margin-top:2px}.amount{font-weight:800;white-space:nowrap}.delete{width:42px;height:42px;padding:0;background:var(--bg);color:var(--fg)}.empty{color:var(--muted);padding:18px 0 4px}.footer-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.install{display:none;margin-top:12px}.install.show{display:block}.tiny{font-size:11px;color:#777;line-height:1.4}@media(max-width:360px){.spent{font-size:40px}.quick{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>
<body>
  <div class="app">
    <header><h1>Weekly Budget</h1><div class="sub" id="weekRange">Diese Woche</div><button id="installBtn" class="install">App installieren</button></header>
    <main>
      <div class="summary"><div class="label">Ausgegeben</div><div class="spent" id="spent">0,00 €</div><div class="left" id="left">Limit: 150,00 €</div><div class="bar"><div id="barFill"></div></div></div>
      <section><div class="label">Neue Ausgabe</div><div class="row" style="margin-top:10px"><input id="amount" inputmode="decimal" autocomplete="off" placeholder="Betrag z.B. 7,50"/><button id="addBtn">Add</button></div><input id="note" autocomplete="off" placeholder="Optional: Mittagessen, Billa, Kaffee..." style="margin-top:10px"/><div class="quick"><button class="quickBtn" data-val="5">+5</button><button class="quickBtn" data-val="10">+10</button><button class="quickBtn" data-val="15">+15</button><button class="quickBtn" data-val="20">+20</button></div></section>
      <section><div class="label">Einstellungen</div><div class="settings-grid" style="margin-top:10px"><input id="limit" inputmode="decimal" autocomplete="off" placeholder="Wochenlimit"/><button id="saveLimitBtn">Save</button></div><div class="small">Automatischer Wochen-Reset jeden Montag. Alte Wochen werden lokal gespeichert.</div></section>
      <section><div class="label">Diese Woche</div><ul id="list"></ul><div id="empty" class="empty">Noch keine Ausgaben diese Woche.</div><div class="footer-actions"><button id="undoBtn" class="secondary">Undo</button><button id="resetBtn" class="danger">Woche leeren</button></div><p class="tiny">Daten bleiben nur auf deinem Gerät im Browser/App-Speicher.</p></section>
    </main>
  </div>
<script>
const STORAGE_KEY='weekly-budget-v1',DEFAULT_LIMIT=150;let deferredPrompt=null,lastDeleted=null;const $=id=>document.getElementById(id);const fmt=new Intl.NumberFormat('de-AT',{style:'currency',currency:'EUR'});const dateFmt=new Intl.DateTimeFormat('de-AT',{day:'2-digit',month:'2-digit'});function mondayKey(date=new Date()){const d=new Date(date);d.setHours(0,0,0,0);const day=d.getDay();const diff=day===0?-6:1-day;d.setDate(d.getDate()+diff);return d.toISOString().slice(0,10)}function weekEndFromKey(key){const d=new Date(key+'T00:00:00');d.setDate(d.getDate()+6);return d}function load(){try{const raw=localStorage.getItem(STORAGE_KEY);if(!raw)return{limit:DEFAULT_LIMIT,currentWeek:mondayKey(),weeks:{}};const data=JSON.parse(raw);data.limit=Number(data.limit)||DEFAULT_LIMIT;data.weeks||={};data.currentWeek=mondayKey();data.weeks[data.currentWeek]||=[];return data}catch{return{limit:DEFAULT_LIMIT,currentWeek:mondayKey(),weeks:{}}}}let state=load();state.weeks[state.currentWeek]||=[];save();function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}function parseMoney(value){if(!value)return NaN;return Number(String(value).replace(/\s/g,'').replace(',','.'))}function addExpense(amount,note=''){const value=Number(amount);if(!Number.isFinite(value)||value<=0)return;const item={id:crypto.randomUUID?crypto.randomUUID():String(Date.now()+Math.random()),amount:Math.round(value*100)/100,note:note.trim(),createdAt:new Date().toISOString()};state.currentWeek=mondayKey();state.weeks[state.currentWeek]||=[];state.weeks[state.currentWeek].push(item);save();render()}function deleteExpense(id){const week=state.weeks[state.currentWeek]||[];const idx=week.findIndex(x=>x.id===id);if(idx>=0){lastDeleted=week.splice(idx,1)[0];save();render()}}function render(){state.currentWeek=mondayKey();state.weeks[state.currentWeek]||=[];const week=state.weeks[state.currentWeek];const total=week.reduce((sum,x)=>sum+Number(x.amount||0),0);const left=state.limit-total;const percent=state.limit>0?Math.min(100,Math.max(0,total/state.limit*100)):100;const start=new Date(state.currentWeek+'T00:00:00');const end=weekEndFromKey(state.currentWeek);$('weekRange').textContent=`${dateFmt.format(start)} – ${dateFmt.format(end)}`;$('spent').textContent=fmt.format(total);$('left').innerHTML=left>=0?`Noch ${fmt.format(left)} von ${fmt.format(state.limit)} übrig`:`<span class="over">${fmt.format(Math.abs(left))} über Limit</span> · Limit ${fmt.format(state.limit)}`;$('barFill').style.width=`${percent}%`;$('limit').value=String(state.limit).replace('.',',');const list=$('list');list.innerHTML='';$('empty').style.display=week.length?'none':'block';[...week].reverse().forEach(item=>{const li=document.createElement('li');const info=document.createElement('div');const title=document.createElement('div');title.className='item-title';title.textContent=item.note||'Ausgabe';const meta=document.createElement('div');meta.className='item-meta';const t=new Date(item.createdAt);meta.textContent=`${dateFmt.format(t)} · ${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}`;info.append(title,meta);const amount=document.createElement('div');amount.className='amount';amount.textContent=fmt.format(item.amount);const del=document.createElement('button');del.className='delete';del.textContent='×';del.setAttribute('aria-label','Ausgabe löschen');del.onclick=()=>deleteExpense(item.id);li.append(info,amount,del);list.appendChild(li)})}$('addBtn').onclick=()=>{const value=parseMoney($('amount').value);addExpense(value,$('note').value);$('amount').value='';$('note').value='';$('amount').focus()};$('amount').addEventListener('keydown',e=>{if(e.key==='Enter')$('addBtn').click()});$('note').addEventListener('keydown',e=>{if(e.key==='Enter')$('addBtn').click()});document.querySelectorAll('.quickBtn').forEach(btn=>{btn.onclick=()=>addExpense(Number(btn.dataset.val),'Quick add')});$('saveLimitBtn').onclick=()=>{const value=parseMoney($('limit').value);if(Number.isFinite(value)&&value>0){state.limit=Math.round(value*100)/100;save();render()}};$('resetBtn').onclick=()=>{if(confirm('Diese Woche wirklich leeren?')){state.weeks[state.currentWeek]=[];lastDeleted=null;save();render()}};$('undoBtn').onclick=()=>{if(lastDeleted){state.weeks[state.currentWeek].push(lastDeleted);lastDeleted=null;save();render()}};window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;$('installBtn').classList.add('show')});$('installBtn').onclick=async()=>{if(!deferredPrompt)return;deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null;$('installBtn').classList.remove('show')};if('serviceWorker'in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'))}render();
</script>
</body>
</html>
